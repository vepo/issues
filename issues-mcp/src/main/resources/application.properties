# Issues REST API (Bearer token forwarded from MCP client Authorization header)
issues.api-base-url=http://localhost:8080/api

quarkus.http.port=8082

# Quarkiverse MCP HTTP transport — Streamable HTTP at /mcp (SSE legacy at /mcp/sse)
quarkus.mcp.server.http.root-path=/mcp

quarkus.rest-client.issues-api.url=${issues.api-base-url}
quarkus.rest-client.issues-api.connect-timeout=5000
quarkus.rest-client.issues-api.read-timeout=30000
