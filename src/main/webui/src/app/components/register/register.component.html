<div class="page-auth">
  <div class="auth-card">
    <div class="auth-card__header">
      <mat-icon fontIcon="person_add" aria-hidden="true"></mat-icon>
      <h1 i18n>Criar conta</h1>
      <p i18n>Cadastre-se para acessar o Issues</p>
    </div>
    <form class="auth-card__body" [formGroup]="form" (ngSubmit)="register()">
      <mat-form-field class="form-field" appearance="outline">
        <mat-label i18n>Usuário</mat-label>
        <input matInput formControlName="username" required autocomplete="username" />
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label i18n>Nome</mat-label>
        <input matInput formControlName="name" required autocomplete="name" />
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label i18n>E-mail</mat-label>
        <input matInput formControlName="email" type="email" required autocomplete="email" />
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label i18n>Senha</mat-label>
        <input
          matInput
          formControlName="password"
          [type]="hide() ? 'password' : 'text'"
          required
          autocomplete="new-password"
        />
        <button type="button" mat-icon-button matSuffix (click)="toggleVisibility($event, 'password')" aria-label="Mostrar senha">
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-hint i18n>8+ caracteres, com maiúscula, minúscula e dígito</mat-hint>
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label i18n>Confirmar senha</mat-label>
        <input
          matInput
          formControlName="confirmPassword"
          [type]="hideConfirm() ? 'password' : 'text'"
          required
          autocomplete="new-password"
        />
        <button type="button" mat-icon-button matSuffix (click)="toggleVisibility($event, 'confirm')" aria-label="Mostrar confirmação">
          <mat-icon>{{ hideConfirm() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (passwordsMismatch()) {
          <mat-error i18n>As senhas não coincidem</mat-error>
        }
      </mat-form-field>
      @if (error) {
        <div class="error" role="alert">{{ error }}</div>
      }
      <div class="form-actions">
        <button class="btn" matButton="filled" type="submit" [disabled]="form.invalid || saving">
          <mat-icon fontIcon="person_add" aria-hidden="true"></mat-icon>
          <span i18n>Criar conta</span>
        </button>
        <button class="btn btn-secondary" matButton="outlined" type="button" routerLink="/login">
          <span i18n>Já tem conta? Entrar</span>
        </button>
      </div>
    </form>
  </div>
</div>
