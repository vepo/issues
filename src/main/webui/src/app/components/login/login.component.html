<div class="page-auth">
  <div class="auth-card">
    <div class="auth-card__header">
      <mat-icon fontIcon="login" aria-hidden="true"></mat-icon>
      <h1>{{ 'auth.login.title' | transloco }}</h1>
      <p>{{ 'auth.login.subtitle' | transloco }}</p>
    </div>
    <form class="auth-card__body" (ngSubmit)="login()">
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>{{ 'auth.email' | transloco }}</mat-label>
        <input matInput [(ngModel)]="email" name="email" required autocomplete="email" />
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>{{ 'auth.password' | transloco }}</mat-label>
        <input
          matInput
          name="password"
          [(ngModel)]="password"
          [type]="hide() ? 'password' : 'text'"
          required
          autocomplete="current-password"
        />
        <button type="button" mat-icon-button matSuffix (click)="clickEvent($event)" [attr.aria-label]="'auth.showPassword' | transloco">
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>
      @if (error) {
        <div class="error" role="alert">{{ error }}</div>
      }
      <div class="form-actions">
        <button class="btn" matButton="filled" type="submit">
          <mat-icon fontIcon="login" aria-hidden="true"></mat-icon>
          <span>{{ 'auth.login.title' | transloco }}</span>
        </button>
        @if (passwordRecovery) {
          <button class="btn btn-secondary" matButton="outlined" type="button" [routerLink]="'/login/register'">
            <span>{{ 'auth.register.title' | transloco }}</span>
          </button>
          <button class="btn btn-secondary" matButton="outlined" type="button" [routerLink]="'/login/reset-password'">
            <span>{{ 'auth.reset.requestTitle' | transloco }}</span>
          </button>
        }
      </div>
    </form>
  </div>
</div>
