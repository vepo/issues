<div class="page-auth">
  <div class="auth-card">
    <div class="auth-card__header">
      <mat-icon fontIcon="vpn_key" aria-hidden="true"></mat-icon>
      <h1 i18n>Redefinir senha</h1>
      <p i18n>Defina uma nova senha para sua conta</p>
    </div>
    <div class="auth-card__body">
      <p class="text-muted" i18n>
        Esta página será concluída em breve. Use o link enviado por e-mail para redefinir sua senha.
      </p>
      <div class="form-actions">
        <button class="btn btn-secondary" matButton="outlined" type="button" [routerLink]="'/login'">
          <mat-icon fontIcon="arrow_back" aria-hidden="true"></mat-icon>
          <span i18n>Voltar ao login</span>
        </button>
      </div>
    </div>
  </div>
</div>
