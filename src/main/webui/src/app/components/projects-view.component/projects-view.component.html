<div class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title" i18n>Projetos</h1>
      <p class="page-subtitle" i18n>Configure projetos e processos de trabalho</p>
    </div>
    <div class="page-header__actions">
      <button class="btn" matButton="filled" [routerLink]="['/', 'projects', 'new']">
        <mat-icon fontIcon="add" aria-hidden="true"></mat-icon>
        <span i18n>Novo projeto</span>
      </button>
    </div>
  </header>

  <section class="page-panel page-panel--flush">
    <div class="data-table">
      <div class="header">
        <div class="header-cell">ID</div>
        <div class="header-cell left-aligned" i18n>Nome</div>
        <div class="header-cell left-aligned" i18n>Descrição</div>
        <div class="header-cell left-aligned" i18n>Prefixo</div>
        <div class="header-cell" i18n>Ações</div>
      </div>
      <div class="body">
        @for (entry of projects; track entry.id) {
          <div class="row {{ $even ? 'even' : 'odd' }}">
            <div>{{ entry.id }}</div>
            <div class="left-aligned">{{ entry.name }}</div>
            <div class="left-aligned">{{ entry.description }}</div>
            <div class="left-aligned">{{ entry.prefix }}</div>
            <div>
              <button class="btn btn-secondary" matButton="outlined" [routerLink]="['/', 'projects', entry.id]">
                <mat-icon fontIcon="edit" aria-hidden="true"></mat-icon>
                <span i18n>Editar</span>
              </button>
            </div>
          </div>
        }
      </div>
      @if (projects.length === 0) {
        <div class="data-table--empty" i18n>Nenhum projeto cadastrado.</div>
      }
    </div>
  </section>
</div>
