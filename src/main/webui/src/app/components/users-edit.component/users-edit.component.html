<div class="page">
  @if (editMode) {
    <header class="page-header">
      <div>
        <h1 class="page-title" i18n>Editar usuário</h1>
        <p class="page-subtitle" i18n>Atualize dados e perfis de acesso</p>
      </div>
    </header>
  } @else {
    <header class="page-header">
      <div>
        <h1 class="page-title" i18n>Novo usuário</h1>
        <p class="page-subtitle" i18n>Cadastre uma nova conta no sistema</p>
      </div>
    </header>
  }

  <form class="edit" [formGroup]="userForm">
    <mat-form-field class="form-field" appearance="outline">
      <mat-label i18n>Nome</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>
    <mat-form-field class="form-field" appearance="outline">
      <mat-label i18n>Usuário</mat-label>
      <input matInput formControlName="username" required />
    </mat-form-field>
    <mat-form-field class="form-field" appearance="outline">
      <mat-label i18n>E-mail</mat-label>
      <input matInput formControlName="email" required type="email" />
    </mat-form-field>
    <section>
      <mat-checkbox [checked]="isRoleSelected('admin')" (change)="toggle('admin')" i18n>Administrador</mat-checkbox>
      <mat-checkbox [checked]="isRoleSelected('project-manager')" (change)="toggle('project-manager')" i18n
        >Gerente de projetos</mat-checkbox
      >
      <mat-checkbox [checked]="isRoleSelected('user')" (change)="toggle('user')" i18n>Usuário</mat-checkbox>
    </section>
    <div class="actions form-actions">
      <button class="btn btn-cancel" matButton="filled" type="button" (click)="cancel()" i18n>Cancelar</button>
      <button class="btn" [disabled]="userForm.invalid" matButton="filled" type="button" (click)="save()" i18n
        >Salvar</button
      >
    </div>
  </form>
</div>
