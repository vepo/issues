<button
  matIconButton
  class="btn-icon-header"
  [matMenuTriggerFor]="notifications"
  aria-label="Notificações">
  <mat-icon fontIcon="notifications" aria-hidden="true"></mat-icon>
  @let badge = badgeLabel();
  @if (badge) {
    <span class="notification-badge" aria-hidden="true">{{ badge }}</span>
  }
</button>
<mat-menu #notifications="matMenu" class="menu-panel notifications">
  <div class="notifications-header" (click)="$event.stopPropagation()">
    <span class="notifications-title" i18n>Notificações</span>
    @if (unread > 0) {
      <button
        type="button"
        class="notifications-mark-all"
        [disabled]="markingAll"
        (click)="markAllAsRead($event)"
        i18n>
        Marcar todas como lidas
      </button>
    }
  </div>
  <div class="notifications-scroll" (scroll)="onScroll($event)" (click)="$event.stopPropagation()">
    @if (events.length === 0 && !loading) {
      <div class="menu-empty" i18n>Nenhuma notificação</div>
    }
    @for (event of events; track event.id) {
      <button mat-menu-item (click)="navigate(event)">
        <div class="notification-container">
          <div class="notification-item">
            <div class="icon">
              @if (event.read) {
                <mat-icon fontIcon="mark_email_read"></mat-icon>
              } @else {
                <mat-icon fontIcon="email"></mat-icon>
              }
            </div>
            <div class="content">
              <span>{{ event.content }}</span>
            </div>
          </div>
          <div class="notification-item">
            <div>&nbsp;</div>
            <div class="notification-date">
              {{ event.timestamp | date: 'dd/MM/yyyy HH:mm' }}
            </div>
          </div>
        </div>
      </button>
    }
    @if (loading) {
      <div class="menu-empty" i18n>Carregando...</div>
    }
  </div>
</mat-menu>
