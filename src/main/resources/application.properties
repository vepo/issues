%dev.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.clean-at-start=true
%dev.quarkus.hibernate-orm.database.generation = validate
%dev.quarkus.hibernate-orm.log.sql=true


auth.access-token-minutes=15
auth.refresh-token-days=30
auth.rate-limit.enabled=true
auth.rate-limit.requests=30
auth.rate-limit.window-seconds=60
%test.auth.rate-limit.enabled=false

# Credential provider: local | ldap | endpoint (env AUTH_PROVIDER maps to auth.provider)
auth.provider=local

# LDAP (used when auth.provider=ldap). Set via AUTH_LDAP_* env vars when needed.
# auth.ldap.url=
# auth.ldap.base-dn=
# auth.ldap.bind-dn=
# auth.ldap.bind-password=
auth.ldap.user-filter=(mail={0})
auth.ldap.email-attribute=mail
auth.ldap.name-attribute=cn
auth.ldap.username-attribute=uid
auth.ldap.group-attribute=memberOf
# Comma-separated group=role pairs; role is admin|project-manager|user
# auth.ldap.group-role-map=

# External credential endpoint (used when auth.provider=endpoint)
# auth.endpoint.url=
auth.endpoint.connect-timeout-ms=5000
auth.endpoint.read-timeout-ms=10000

mp.jwt.verify.issuer=https://issues.vepo.dev
# Override in Docker/production: MP_JWT_VERIFY_ISSUER=https://your-host.example
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
# Production JWT key rotation: point mp.jwt.verify.publickey.location at a JWKS URL or file
# listing current and previous public keys during rollover (SmallRye JWT verifies against all).

password.algorithm=PBKDF2WithHmacSHA512
password.iterations=65536
password.key.length=512
# Legacy global salt — only used to verify pre-v1 password hashes during login migration
password.
# Default encoded password for admin-created users — %dev/%test only (SEC3)
%dev.password.default=IwS3Mm4oGEfpwPDC3Vom20ViYgXhVCxHeBGr8aluY9tC9o668ghxJ2fMQQUwq+7GWJkzX1HguXOtdwVkblUzTw==
%test.password.default=IwS3Mm4oGEfpwPDC3Vom20ViYgXhVCxHeBGr8aluY9tC9o668ghxJ2fMQQUwq+7GWJkzX1HguXOtdwVkblUzTw==

quarkus.flyway.migrate-at-start=true

# Quinoa configuration
quarkus.quinoa=true
%test.quarkus.quinoa=false
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.dev-server.port=4200
quarkus.quinoa.dev-server.command=npm run start:locale

quarkus.smallrye-openapi.path=/openapi.yaml
%test.quarkus.smallrye-openapi.store-schema-directory=target/openapi
# Swagger UI: enabled for local/test only (SEC11)
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=false
%prod.quarkus.swagger-ui.enable=false
quarkus.swagger-ui.footer=&#169; 2025 Issues - https://vepo.dev
quarkus.swagger-ui.path=/openapi
quarkus.swagger-ui.title=Issues - API

# Bundled privateKey.pem / publicKey.pem are for %dev / %test only (SEC2).
# %prod MUST set SMALLRYE_JWT_SIGN_KEY_LOCATION and MP_JWT_VERIFY_PUBLICKEY_LOCATION
# (or JWKS) to environment-specific keys — never copy the repo PEMs.
smallrye.jwt.sign.key.location=privateKey.pem
%dev.quarkus.datasource.dev-ui.allow-sql=true


## Mailer (%dev) — credentials from env (SEC13); rotate any previously committed Mailtrap secrets
%dev.quarkus.mailer.from=contato@issues.vepo.dev
%dev.quarkus.mailer.host=sandbox.smtp.mailtrap.io
%dev.quarkus.mailer.port=2525
%dev.quarkus.mailer.start-tls=DISABLED
%dev.quarkus.mailer.username=${MAILTRAP_USERNAME:}
%dev.quarkus.mailer.password=${MAILTRAP_PASSWORD:}
%dev.quarkus.mailer.mock=${MAILTRAP_MOCK:true} 
baseUrl=http://localhost:8080
issues.public-base-url=http://localhost:8080
issues.mcp-public-base-url=http://localhost:8082
issues.attachments.storage-dir=./data/attachments
quarkus.http.limits.max-body-size=12M
%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true
